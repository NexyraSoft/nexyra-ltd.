services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # 2. Backend API
  backend:
    build:
      context: .
      target: backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/nexyrasoft
      - JWT_SECRET=development_secret_only
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb

  # 3. Frontend Web App
  frontend:
    build:
      context: .
      target: frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
