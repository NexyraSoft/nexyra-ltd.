services:
  # Backend Web Service
  - type: web
    name: nexyrasoft-backend
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build -w backend
    startCommand: npm run start -w backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://nexyra-ltd-frontend.vercel.app # Update this after frontend is deployed
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: COMPANY_NOTIFICATION_EMAIL
        sync: false
    healthCheckPath: /api/health

  # Note: Frontend is deployed on Vercel instead of Render
  # See vercel.json and DEPLOYMENT.md for Vercel configuration
